<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>molt · grid dispatch</title>
    <!-- The broker injects a base href server-side so the relative asset URLs below resolve under the
         ALB path prefix (e.g. /grid/dashboard); no inline JS is used because the dashboard CSP is
         strict (default-src self). app.js derives its API prefix from document.baseURI. -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="logo">▰▰▱</span>
        <h1>molt <span class="dim">· distributed agent compute grid</span></h1>
      </div>
      <div class="hdr-right">
        <input id="op-key" type="password" placeholder="operator key — unlocks events" autocomplete="off" spellcheck="false" />
        <div class="status" id="broker-status"><span class="dot"></span> connecting…</div>
      </div>
    </header>

    <main>
      <section class="col col-wide">
        <h2>Objectives</h2>
        <div id="objectives" class="stack"></div>
      </section>

      <section class="col">
        <h2>Workers</h2>
        <div id="workers" class="stack"></div>

        <h2>Event feed</h2>
        <div id="events" class="feed"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
