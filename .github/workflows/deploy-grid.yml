name: Deploy molt-dispatch grid to ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION:         ca-west-1
  ECR_REPOSITORY:     molt-broker
  ECS_CLUSTER:        runechain-cluster
  ECS_SERVICE:        molt-broker-service
  ECS_TASK_FAMILY:    molt-broker
  CONTAINER_NAME:     molt-broker
  TASK_DEFINITION:    .aws/molt-broker-task-definition.json

jobs:
  # ── 1. Test ─────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run test suite
        run: npm test

  # ── 2. Build + Deploy (main branch only) ────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write   # OIDC for AWS

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push broker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Patch the EFS IDs into the task definition from Terraform outputs
      # stored as GitHub secrets after `terraform apply`.
      - name: Patch task definition (EFS IDs + image)
        id: task-def-rendered
        env:
          IMAGE:      ${{ steps.build.outputs.image }}
          EFS_ID:     ${{ secrets.MOLT_EFS_ID }}
          EFS_AP_ID:  ${{ secrets.MOLT_EFS_AP_ID }}
        run: |
          PATCHED=$(jq \
            --arg img "$IMAGE" \
            --arg efs "$EFS_ID" \
            --arg ap  "$EFS_AP_ID" \
            '
              .containerDefinitions[0].image = $img |
              .volumes[0].efsVolumeConfiguration.fileSystemId = $efs |
              .volumes[0].efsVolumeConfiguration.authorizationConfig.accessPointId = $ap
            ' ${{ env.TASK_DEFINITION }})
          echo "$PATCHED" > /tmp/task-def.json
          echo "definition=/tmp/task-def.json" >> $GITHUB_OUTPUT

      - name: Register + deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-rendered.outputs.definition }}
          service:         ${{ env.ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Create ECS service if missing
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster  $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].status' --output text 2>/dev/null || echo "NONE")
          if [ "$STATUS" = "ACTIVE" ]; then
            echo "Service already active — deploy step updated it."
            exit 0
          fi
          echo "Creating ECS service $ECS_SERVICE…"
          VPC=$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' --output text)
          SUBNETS=$(aws ec2 describe-subnets \
            --filters Name=vpc-id,Values=$VPC \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',')
          SG=$(aws ec2 describe-security-groups \
            --filters Name=group-name,Values=molt-broker-sg Name=vpc-id,Values=$VPC \
            --query 'SecurityGroups[0].GroupId' --output text)
          TG=$(aws elbv2 describe-target-groups \
            --names molt-broker-tg \
            --query 'TargetGroups[0].TargetGroupArn' --output text)
          TD=$(aws ecs register-task-definition \
            --cli-input-json file://${{ steps.task-def-rendered.outputs.definition }} \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs create-service \
            --cluster $ECS_CLUSTER \
            --service-name $ECS_SERVICE \
            --task-definition "$TD" \
            --desired-count 1 \
            --launch-type FARGATE \
            --health-check-grace-period-seconds 60 \
            --load-balancers "targetGroupArn=$TG,containerName=$CONTAINER_NAME,containerPort=7077" \
            --network-configuration \
              "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}"

      - name: Smoke test broker health
        run: |
          URL="https://play.runechaingame.com/grid/health"
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Broker healthy at $URL"
              exit 0
            fi
            echo "Attempt $i — HTTP $STATUS, retrying in 15s…"
            sleep 15
          done
          echo "❌ Broker did not become healthy"
          exit 1
