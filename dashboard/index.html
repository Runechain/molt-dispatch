<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>molt · admin slab</title>
    <!-- The broker injects `<base href="${pathPrefix}/dashboard/">` right after <head> server-side, so
         the relative asset URLs below resolve under the ALB path prefix (e.g. /grid/dashboard). Keep this
         <head> structure and the relative hrefs intact. No inline JS — the dashboard CSP is strict
         (default-src 'self'); app.js derives its API prefix from document.baseURI. -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <span class="logo">▰▰▱</span>
        <h1>molt <span class="dim">· admin slab · distributed agent compute grid</span></h1>
      </div>
      <div class="hdr-right">
        <input id="op-key" type="password" placeholder="operator API key — Bearer id.secret" autocomplete="off" spellcheck="false" />
        <div class="status" id="broker-status"><span class="dot"></span> connecting…</div>
      </div>
    </header>

    <!-- Inline status line for POST results (apply config / 401 / restart-required). -->
    <div id="toast" class="toast" hidden></div>

    <main class="slab">
      <!-- ===== MONITORING ===== -->
      <section class="panel span-4" id="panel-summary">
        <h2>Summary</h2>
        <div id="summary" class="bignums"><div class="empty">…</div></div>
      </section>

      <section class="panel span-2" id="panel-readiness">
        <h2>Readiness</h2>
        <div id="readiness"><div class="empty">…</div></div>
      </section>

      <section class="panel span-3" id="panel-queue">
        <h2>Queue · demand by capability</h2>
        <div id="queue" class="stack"><div class="empty">…</div></div>
      </section>

      <section class="panel span-3" id="panel-workers">
        <h2>Workers</h2>
        <div id="workers" class="stack"><div class="empty">…</div></div>
      </section>

      <section class="panel span-3" id="panel-delib">
        <h2>Deliberations · quorum</h2>
        <div id="deliberations" class="stack"><div class="empty">…</div></div>
      </section>

      <section class="panel span-3" id="panel-rep">
        <h2>Reputation</h2>
        <div id="reputation" class="stack"><div class="empty">…</div></div>
      </section>

      <!-- ===== CONTROL ===== -->
      <section class="panel span-3" id="panel-config">
        <h2>Control · runtime config</h2>
        <!-- Restart bar: triggers POST /admin/restart (operator-only). The pending notice is populated
             by renderConfig() each poll — it counts restart-tier knobs that hold a stored-but-not-applied
             override, so the operator knows a restart is needed to make those 🟡 changes take effect. -->
        <div class="restart-bar">
          <span id="restart-pending" class="restart-pending" hidden></span>
          <button id="restart-broker" class="restart-btn" type="button" title="restart the broker to apply pending restart-tier overrides">Restart broker</button>
        </div>
        <div id="config" class="config"><div class="empty">…</div></div>
      </section>

      <!-- ===== INVITES — node onboarding ===== -->
      <section class="panel span-3" id="panel-invites">
        <h2>Invites — node onboarding</h2>
        <form id="invite-form" class="invite-form" autocomplete="off">
          <input id="inv-label" class="inv-input" type="text" placeholder="label — who/what this invite is for" spellcheck="false" />
          <input id="inv-max" class="inv-input inv-max" type="number" min="1" step="1" placeholder="max uses (∞)" />
          <button id="inv-issue" class="inv-issue" type="submit">Issue invite</button>
        </form>
        <!-- one-time token reveal: populated on a successful issue, otherwise empty -->
        <div id="invite-reveal" class="invite-reveal" hidden></div>
        <div id="invites" class="stack"><div class="empty">…</div></div>
      </section>

      <!-- ===== LIVE LOG ===== -->
      <section class="panel span-3" id="panel-events">
        <h2>Event log <span id="ev-live" class="dim">· idle</span></h2>
        <div id="events" class="feed"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
